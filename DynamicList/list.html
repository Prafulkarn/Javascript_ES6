<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic List Controller</title>
    <link rel="stylesheet" href="list.css" />
  </head>
  <body>
    <h2>Dynamic List Controller</h2>
    <button id="addbtn">Add Item</button>
    <button id="removebtn">Remove Last item</button>
    <div id="inputListContainer">
      <label for="list-input">Type an item to insert into the list</label>
      <input id="list-input" type="text" />
      <button id="inputAddbtn">ADD</button>
    </div>
    <ul id="list"></ul>
    <script src="list.js"></script>
  </body>
</html>
