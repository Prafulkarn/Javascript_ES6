<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page-wrapper">
      <div class="card">
        <div class="card-header">
          <div class="logo">🎓</div>
          <h1>Create Account</h1>
          <p>Join the edu.np learning platform</p>
        </div>

        <form id="registrationForm" novalidate>
          <!-- ROW 1: Full Name + Username -->
          <div class="form-row">
            <div class="form-group">
              <label for="fullName">Full Name <span class="req">*</span></label>
              <input
                type="text"
                id="fullName"
                name="fullName"
                placeholder="Aarav Sharma"
              />
              <span class="error-msg" id="fullNameError"></span>
            </div>

            <div class="form-group">
              <label for="username">Username <span class="req">*</span></label>
              <input
                type="text"
                id="username"
                name="username"
                placeholder="aarav123"
              />
              <span class="error-msg" id="usernameError"></span>
            </div>
          </div>

          <!-- ROW 2: Role + Course -->
          <div class="form-row">
            <div class="form-group">
              <label for="role">Role <span class="req">*</span></label>
              <select id="role" name="role">
                <option value="">— Select Role —</option>
                <option value="Student">Student</option>
                <option value="Teacher">Teacher</option>
              </select>
              <span class="error-msg" id="roleError"></span>
            </div>

            <div class="form-group">
              <label for="course">Course <span class="req">*</span></label>
              <input
                type="text"
                id="course"
                name="course"
                placeholder="BSc.CSIT / BCA / BBS…"
              />
              <span class="error-msg" id="courseError"></span>
            </div>
          </div>

          <!-- ROW 3: Email -->
          <div class="form-group full-width">
            <label for="email">Email <span class="req">*</span></label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Depends on your role"
            />
            <span class="hint" id="emailHint"
              >Select a role first to see email requirement.</span
            >
            <span class="error-msg" id="emailError"></span>
          </div>

          <!-- ROW 4: Age + Gender -->
          <div class="form-row">
            <div class="form-group">
              <label for="age">Age <span class="req">*</span></label>
              <input
                type="number"
                id="age"
                name="age"
                placeholder="18"
                min="5"
                max="120"
              />
              <span class="error-msg" id="ageError"></span>
            </div>

            <div class="form-group">
              <label for="gender">Gender <span class="req">*</span></label>
              <select id="gender" name="gender">
                <option value="">— Select —</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
                <option value="PreferNotToSay">Prefer not to say</option>
              </select>
              <span class="error-msg" id="genderError"></span>
            </div>
          </div>

          <!-- ROW 5: Password + Confirm Password -->
          <div class="form-row">
            <div class="form-group">
              <label for="password">Password <span class="req">*</span></label>
              <div class="input-wrapper">
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Min. 8 characters"
                />
                <button
                  type="button"
                  class="toggle-pw"
                  data-target="password"
                  aria-label="Toggle password"
                >
                  👁
                </button>
              </div>
              <span class="error-msg" id="passwordError"></span>
            </div>

            <div class="form-group">
              <label for="confirmPassword"
                >Confirm Password <span class="req">*</span></label
              >
              <div class="input-wrapper">
                <input
                  type="password"
                  id="confirmPassword"
                  name="confirmPassword"
                  placeholder="Repeat password"
                />
                <button
                  type="button"
                  class="toggle-pw"
                  data-target="confirmPassword"
                  aria-label="Toggle confirm password"
                >
                  👁
                </button>
              </div>
              <span class="error-msg" id="confirmPasswordError"></span>
            </div>
          </div>

          <!-- Terms -->
          <div class="form-group full-width terms-group">
            <label class="checkbox-label">
              <input type="checkbox" id="terms" name="terms" />
              <span class="checkmark"></span>
              I agree to the
              <a href="#" class="link">Terms &amp; Conditions</a> and
              <a href="#" class="link">Privacy Policy</a>
            </label>
            <span class="error-msg" id="termsError"></span>
          </div>

          <button type="submit" class="btn-submit">Register Now</button>
        </form>

        <p class="footer-note">
          Already have an account? <a href="#" class="link">Sign in</a>
        </p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
